<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Collection Thumbnail Builder</title>
<style>:root{
  --bg:#f4f4f5; --card:#fff; --ink:#1c1c1e; --muted:#6b6b70;
  --border:#e7e7e9; --accent:#1c1c1e; --ring:#5b5bd6; --radius:16px; --radius-sm:10px;
}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--ink);
  font:15px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 22px}
.topbar h1{font-size:16px;margin:0;font-weight:650}
.layout{display:grid;grid-template-columns:380px 1fr;gap:18px;padding:0 22px 18px;align-items:start}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
  box-shadow:0 1px 3px rgba(0,0,0,.04)}
.controls{padding:22px}
.group{padding:14px 0;border-top:1px solid var(--border)}
.group:first-child{border-top:none;padding-top:0}
.group label.h{display:block;font-weight:600;margin-bottom:8px}
input[type=text]{width:100%;padding:9px 11px;border:1px solid var(--border);
  border-radius:var(--radius-sm);font:inherit;background:#fff}
select{width:100%;padding:9px 11px;border:1px solid var(--border);border-radius:var(--radius-sm);
  font:inherit;background:#fff}
.swatches{display:flex;gap:10px;align-items:center}
.swatch{width:34px;height:34px;border-radius:50%;border:1px solid var(--border);cursor:pointer;
  position:relative}
.swatch.sel{box-shadow:0 0 0 2px #fff,0 0 0 4px var(--ring)}
.upload-tile{width:34px;height:34px;border-radius:8px;border:1.5px dashed #c4c4c8;background:#fafafa;
  display:flex;align-items:center;justify-content:center;color:var(--muted);cursor:pointer;font-size:18px}
.row{display:flex;gap:14px;align-items:center}
.toggle{width:42px;height:24px;border-radius:999px;background:#d4d4d8;position:relative;cursor:pointer;
  flex:0 0 auto;transition:background .15s}
.toggle.on{background:#6b6b70}
.toggle .knob{position:absolute;top:2px;left:2px;width:20px;height:20px;border-radius:50%;background:#fff;
  transition:left .15s}
.toggle.on .knob{left:20px}
.hide{display:none!important}
.seg{display:inline-flex;border:1px solid var(--border);border-radius:var(--radius-sm);overflow:hidden}
.seg button{border:0;background:#fff;padding:7px 14px;font:inherit;cursor:pointer;color:var(--muted)}
.seg button.sel{background:#f0f0f2;color:var(--ink);font-weight:600}
.preview{padding:22px;display:flex;flex-direction:column;align-items:center;gap:14px;min-height:520px;
  justify-content:center;position:sticky;top:16px;align-self:start}
@media(max-width:820px){.preview{position:static}}
.zoombar{display:flex;align-items:center;gap:10px;color:var(--muted)}
.zoombar button{width:30px;height:30px;border:1px solid var(--border);background:#fff;border-radius:8px;
  font-size:16px;cursor:pointer}
.stage-wrap{display:flex;align-items:center;justify-content:center}
#stage{position:relative;width:96px;height:96px;
  background-image:repeating-conic-gradient(#e9e9ec 0 25%,#fff 0 50%);
  background-size:16px 16px;transform-origin:center center}
#stage .layer{position:absolute}
#stage .layer img{width:100%;height:100%;object-fit:contain;display:block;pointer-events:none}
#stage .layer.sel{outline:2px solid var(--ring);outline-offset:1px}
#stage .layer.clickable{cursor:pointer}
.year-tag{display:flex;align-items:center;justify-content:center;border-radius:0;
  font:italic 600 8.5px/1 Baskerville,"Baskerville Old Face","Libre Baskerville",Georgia,"Times New Roman",serif;
  letter-spacing:1px;text-indent:1px;color:#111}
.selbar{min-height:22px;color:var(--muted);font-size:13px;text-align:center}
.selbar b{color:var(--ink)}
.selbar a{color:var(--ring);cursor:pointer;text-decoration:underline;margin-left:8px}
.actionbar{position:fixed;left:0;right:0;bottom:0;background:rgba(255,255,255,.92);
  backdrop-filter:blur(6px);border-top:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;padding:14px 22px}
.actionbar .fname{color:var(--muted);font-size:13px}
.btn-primary{background:var(--accent);color:#fff;border:0;border-radius:var(--radius-sm);
  padding:11px 22px;font:inherit;font-weight:600;cursor:pointer}
@media(max-width:820px){.layout{grid-template-columns:1fr}}</style>
</head>
<body>
<div id="app">
<div class="topbar"><h1>Thumbnail Builder</h1></div>
<div class="layout">
  <div class="card controls">
    <div class="group">
      <label class="h" for="nameInput">Name of thumbnail</label>
      <input type="text" id="nameInput" placeholder="e.g. germany-death-1930">
    </div>
    <div class="group">
      <label class="h">Background</label>
      <div class="swatches" id="bgRow"></div>
    </div>
    <div class="group">
      <label class="h" for="mainSelect">Main image</label>
      <select id="mainSelect"></select>
    </div>
    <div class="group">
      <div class="row"><label class="h" style="margin:0">Secondary image</label>
        <div class="toggle" id="secToggle"><div class="knob"></div></div></div>
      <div id="secWrap" class="hide" style="margin-top:10px"><select id="secSelect"></select></div>
    </div>
    <div class="group">
      <div class="row"><label class="h" style="margin:0">Attached documentation</label>
        <div class="toggle" id="docsToggle"><div class="knob"></div></div></div>
    </div>
    <div class="group">
      <div class="row"><label class="h" style="margin:0">Year</label>
        <div class="toggle" id="yearToggle"><div class="knob"></div></div></div>
      <div id="yearWrap" class="hide" style="margin-top:10px">
        <input type="text" id="yearInput" placeholder="e.g. 1930">
        <div style="margin-top:10px;color:var(--muted);font-size:13px">Tag color</div>
        <div class="swatches" id="yearColors" style="margin-top:6px"></div>
      </div>
    </div>
    <div class="group">
      <label class="h">Top-right corner</label>
      <div class="seg" id="cornerSeg">
        <button data-corner="none" class="sel">None</button>
        <button data-corner="flags">Flags</button>
        <button data-corner="symbol">Symbol</button>
      </div>
      <div id="flagsWrap" class="hide" style="margin-top:12px"></div>
      <div id="symbolWrap" class="hide" style="margin-top:12px"></div>
    </div>
  </div>
  <div class="card preview">
    <div class="zoombar">
      <button id="zoomOut">−</button><span id="zoomLabel">100%</span><button id="zoomIn">+</button>
    </div>
    <div class="stage-wrap"><div id="stage"></div></div>
    <div class="selbar" id="selBar"></div>
  </div>
</div>
<div id="galleryCard" class="card" style="margin:0 22px 96px;padding:16px 22px">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;flex-wrap:wrap;gap:8px">
    <strong style="font-size:14px">My thumbnails</strong>
    <span style="font-size:13px;color:var(--muted)">
      saved in this browser ·
      <a id="openProj" style="color:var(--ring);cursor:pointer;text-decoration:underline">Open project file…</a> ·
      <a id="saveProj" style="color:var(--ring);cursor:pointer;text-decoration:underline">Save project file</a>
    </span>
  </div>
  <div id="gallery" style="display:flex;gap:14px;flex-wrap:wrap"></div>
</div>
<div class="actionbar">
  <span class="fname" id="fileNameLabel">thumbnail.png</span>
  <div style="display:flex;gap:10px;align-items:center">
    <button class="seg" id="newBtn" style="border-radius:10px;padding:10px 16px">New</button>
    <button class="seg" id="saveBtn" style="border-radius:10px;padding:10px 16px">Save</button>
    <button class="btn-primary" id="downloadBtn">Download PNG</button>
  </div>
</div>
<div id="exportModal" class="hide" style="position:fixed;inset:0;background:rgba(0,0,0,.35);
  display:flex;align-items:center;justify-content:center;z-index:10">
  <div class="card" style="padding:22px;width:360px">
    <h3 style="margin:0 0 12px">Download size</h3>
    <div id="sizeList"></div>
    <div id="customRow" class="hide" style="margin-top:10px;display:flex;gap:8px;align-items:center">
      <input type="text" id="customW" placeholder="W" style="width:70px">×
      <input type="text" id="customH" placeholder="H" style="width:70px"> px
    </div>
    <div style="display:flex;justify-content:flex-end;gap:10px;margin-top:18px">
      <button id="exportCancel" class="seg" style="border-radius:10px;padding:9px 16px">Cancel</button>
      <button id="exportGo" class="btn-primary">Download</button>
    </div>
  </div>
</div>
</div>

/* ============================ STATE + RENDER ============================ */
const state = {
  name: '',
  background: CONFIG.backgrounds[0].id,
  bgUpload: null,                 // dataURL if uploaded
  main: CONFIG.mainImages[0].id,
  mainUpload: null,
  secondaryOn: false, secondary: CONFIG.secondaryImages[0].id, secUpload: null,
  docsOn: false,                  // "attached documentation" layer (top-left, behind main)
  yearOn: false, year: '', yearColor: 'green',
  corner: 'none',                 // 'none' | 'flags' | 'symbol'
  flagCount: 1,
  flags: ['us', 'de', 'fr', 'it'],// flag ids (up to 4); each subsequent flag is offset further down-right
  flagFrontIsFirst: false,        // default: the offset (lower-right) flag sits on top, matching the kit
  flagScale: 1,                   // global flag size multiplier (shrink to fit more flags)
  flagUploads: [null, null, null, null],
  symbolUpload: null,
  offsets: {},                    // key -> {dx,dy} nudge in 96-space
  scales: {},                     // key -> size multiplier (per-item resize); flags use flagScale instead
  selected: null,                 // selected layer key
  zoom: 3                          // view scale (stage shown at zoom * 96 px)
};

// Prefer the inlined data URI (from assets-data.js) so canvas export works
// from file://; fall back to ASSET_BASE for HTTP-hosted setups.
function assetURL(src){
  return (window.ASSETS && window.ASSETS[src]) || (CONFIG.ASSET_BASE + src);
}
function findById(list, id){ return list.find(x => x.id === id); }

const natural = {};              // src/dataURL -> {w,h}
function measure(url){
  return new Promise(res => {
    if (natural[url]) return res(natural[url]);
    const im = new Image();
    im.onload = () => { natural[url] = {w:im.naturalWidth, h:im.naturalHeight}; res(natural[url]); };
    im.onerror = () => { natural[url] = {w:CONFIG.BASE_SIZE, h:CONFIG.BASE_SIZE}; res(natural[url]); };
    im.src = url;
  });
}

// Centered footprint for an image. Catalog art keeps its native Figma-scale
// size (so the background blob shows around a smaller main image); only
// oversized uploads are scaled down to fit. Never upscale.
// Scale an image to fit within a boxW×boxH footprint (96-space), aspect preserved,
// centered. Never upscales past native. Used for background, main, and uploads.
function fitBox(url, boxW, boxH){
  const n = natural[url] || {w:CONFIG.BASE_SIZE, h:CONFIG.BASE_SIZE};
  const s = Math.min(boxW / n.w, boxH / n.h, 1);
  return TB.centerRect(n.w * s, n.h * s, CONFIG.BASE_SIZE);
}

function bgSrcURL(){ return state.bgUpload || assetURL(findById(CONFIG.backgrounds, state.background).src); }
function mainSrcURL(){ return state.mainUpload || assetURL(findById(CONFIG.mainImages, state.main).src); }
function secSrcURL(){ return state.secUpload || assetURL(findById(CONFIG.secondaryImages, state.secondary).src); }
function flagSrcURL(i){ return state.flagUploads[i] || assetURL(findById(CONFIG.flags, state.flags[i]).src); }

function getLayers(){
  const L = CONFIG.LAYOUT, layers = [];
  // Background blob fills most of the tile (~71px); a custom upload fits the same area.
  layers.push({ key:'background', kind:'image', src:bgSrcURL(), rect:fitBox(bgSrcURL(), 71, 69) });
  // Attached documentation: the "documents" illustration, top-left, behind the main image.
  if (state.docsOn){
    layers.push({ key:'docs', kind:'image', src:assetURL(CONFIG.DOCS_SRC), rect:{...L.docs} });
  }
  // Main illustration uses its Figma footprint so the blob shows around it; uploads fit a 66px box.
  let mainRect;
  if (state.mainUpload) mainRect = fitBox(mainSrcURL(), 66, 66);
  else { const ms = CONFIG.MAIN_SIZE[state.main] || {w:64, h:64}; mainRect = fitBox(mainSrcURL(), ms.w, ms.h); }
  layers.push({ key:'main', kind:'image', src:mainSrcURL(), rect:mainRect });
  if (state.yearOn)
    layers.push({ key:'year', kind:'year', text:state.year, color:CONFIG.YEAR_PALETTE[state.yearColor], rect:{...L.year} });
  if (state.secondaryOn)
    layers.push({ key:'secondary', kind:'image', src:secSrcURL(), rect:{...L.secondary} });
  if (state.corner === 'flags'){
    const fs = state.flagScale, fw = L.flag.w * fs, fh = L.flag.h * fs;
    const dx = L.flag2Offset.dx * fs, dy = L.flag2Offset.dy * fs;
    const rects = [];
    for (let i = 0; i < state.flagCount; i++)
      rects.push({ x: L.flag.x + i*dx, y: L.flag.y + i*dy, w: fw, h: fh });
    // Draw order: each subsequent (further down-right) flag sits on top. For exactly
    // two flags, "Swap front/back" can reverse which is on top.
    let order = rects.map((_, i) => i);
    if (state.flagCount === 2 && state.flagFrontIsFirst) order = [1, 0];
    order.forEach(i => layers.push({ key:'flag'+i, kind:'image', src:flagSrcURL(i), rect:rects[i] }));
  } else if (state.corner === 'symbol' && state.symbolUpload){
    layers.push({ key:'symbol', kind:'symbol', src:state.symbolUpload, rect:{...L.symbol} });
  }
  return layers;
}

function applyOffset(rect, key){
  const o = state.offsets[key]; if (!o) return rect;
  return { ...rect, x: rect.x + o.dx, y: rect.y + o.dy };
}

// Per-item resize: scale a layer's rect about its center by state.scales[key].
function applyScale(rect, key){
  const s = state.scales[key]; if (!s || s === 1) return rect;
  const cx = rect.x + rect.w/2, cy = rect.y + rect.h/2, w = rect.w*s, h = rect.h*s;
  return { x: cx - w/2, y: cy - h/2, w, h };
}
function placedRect(rect, key){ return applyOffset(applyScale(rect, key), key); }

const stage = document.getElementById('stage');
function render(){
  stage.style.width = stage.style.height = CONFIG.BASE_SIZE + 'px';
  stage.style.transform = 'scale(' + state.zoom + ')';
  // transform:scale doesn't affect layout, so reserve the scaled footprint on the
  // wrapper — otherwise sibling UI overlaps the stage. The stage's 96px box is
  // centered in this wrap and scales from its center, filling the wrap exactly.
  const wrap = stage.parentElement;
  wrap.style.width = wrap.style.height = (CONFIG.BASE_SIZE * state.zoom) + 'px';
  stage.innerHTML = '';
  getLayers().forEach(layer => {
    const r = placedRect(layer.rect, layer.key);
    const el = document.createElement('div');
    el.className = 'layer clickable' + (state.selected === layer.key ? ' sel' : '');
    el.dataset.key = layer.key;
    el.style.left = r.x+'px'; el.style.top = r.y+'px';
    el.style.width = r.w+'px'; el.style.height = r.h+'px';
    if (layer.kind === 'image'){
      const im = document.createElement('img'); im.src = layer.src; el.appendChild(im);
    } else if (layer.kind === 'symbol'){
      const im = document.createElement('img'); im.src = layer.src;
      im.style.borderRadius = '50%'; im.style.objectFit = 'cover'; el.appendChild(im);
    } else if (layer.kind === 'year'){
      el.classList.add('year-tag'); el.style.background = layer.color; el.textContent = layer.text || '';
    }
    stage.appendChild(el);
  });
  document.getElementById('zoomLabel').textContent = Math.round(state.zoom/3*100) + '%';
}

/* ============================ BOOT ============================ */
async function preloadAndRender(){
  const urls = [bgSrcURL(), mainSrcURL()];
  await Promise.all(urls.map(measure));
  render();
}
preloadAndRender();

/* ============================ UI ============================ */
const $ = id => document.getElementById(id);
function fileURLfromUpload(file, cb){ const fr = new FileReader(); fr.onload = () => cb(fr.result); fr.readAsDataURL(file); }
function uploadTile(onPick){
  const t = document.createElement('label'); t.className = 'upload-tile'; t.title = 'Upload your own'; t.textContent = '＋';
  const inp = document.createElement('input'); inp.type='file'; inp.accept='image/*'; inp.style.display='none';
  inp.onchange = e => { if (e.target.files[0]) fileURLfromUpload(e.target.files[0], onPick); };
  t.appendChild(inp); return t;
}
function updateFilename(){ $('fileNameLabel').textContent = TB.sanitizeFilename(state.name); }

function buildSwatches(rowEl, selectedId, onSelect, palette){
  palette = palette || CONFIG.PALETTE;
  rowEl.innerHTML = '';
  CONFIG.backgrounds.forEach(bg => {
    const s = document.createElement('div');
    s.className = 'swatch' + (bg.id === selectedId ? ' sel' : '');
    s.style.background = palette[bg.id];
    s.title = bg.label; s.onclick = () => onSelect(bg.id);
    rowEl.appendChild(s);
  });
}

function buildControls(){
  // Name
  $('nameInput').oninput = e => { state.name = e.target.value; updateFilename(); };

  // Background swatches + upload
  renderBg = function(){
    buildSwatches($('bgRow'), state.bgUpload ? null : state.background, id => {
      state.background = id; state.bgUpload = null; renderBg(); preloadAndRender();
    });
    $('bgRow').appendChild(uploadTile(url => { state.bgUpload = url; renderBg();
      measure(url).then(render); }));
  };
  renderBg();

  // Main dropdown (+ upload option)
  const ms = $('mainSelect'); ms.innerHTML = '';
  CONFIG.mainImages.forEach(m => ms.add(new Option(m.label, m.id)));
  ms.add(new Option('Upload your own…', '__upload'));
  ms.value = state.main;
  ms.onchange = e => {
    if (e.target.value === '__upload'){ pickUpload(url => { state.mainUpload = url; measure(url).then(render); }); ms.value = state.main; }
    else { state.main = e.target.value; state.mainUpload = null; preloadAndRender(); }
  };

  // Secondary toggle + dropdown
  $('secToggle').onclick = () => {
    state.secondaryOn = !state.secondaryOn;
    $('secToggle').classList.toggle('on', state.secondaryOn);
    $('secWrap').classList.toggle('hide', !state.secondaryOn);
    render();
  };
  const ss = $('secSelect'); CONFIG.secondaryImages.forEach(s => ss.add(new Option(s.label, s.id)));
  ss.add(new Option('Upload your own…', '__upload')); ss.value = state.secondary;
  ss.onchange = e => {
    if (e.target.value === '__upload'){ pickUpload(url => { state.secUpload = url; render(); }); ss.value = state.secondary; }
    else { state.secondary = e.target.value; state.secUpload = null; render(); }
  };

  // Attached documentation toggle (uses the existing "documents" illustration)
  $('docsToggle').onclick = () => {
    state.docsOn = !state.docsOn;
    $('docsToggle').classList.toggle('on', state.docsOn);
    render();
  };

  // Year toggle + input + colors
  $('yearToggle').onclick = () => {
    state.yearOn = !state.yearOn;
    $('yearToggle').classList.toggle('on', state.yearOn);
    $('yearWrap').classList.toggle('hide', !state.yearOn);
    render();
  };
  $('yearInput').oninput = e => { state.year = e.target.value; render(); };
  renderYearColors = function(){
    buildSwatches($('yearColors'), state.yearColor, id => {
      state.yearColor = id; renderYearColors(); render();
    }, CONFIG.YEAR_PALETTE);
  };
  renderYearColors();

  // Corner segmented control
  $('cornerSeg').querySelectorAll('button').forEach(btn => {
    btn.onclick = () => {
      state.corner = btn.dataset.corner;
      $('cornerSeg').querySelectorAll('button').forEach(b => b.classList.toggle('sel', b === btn));
      $('flagsWrap').classList.toggle('hide', state.corner !== 'flags');
      $('symbolWrap').classList.toggle('hide', state.corner !== 'symbol');
      render();
    };
  });
  buildFlagsUI(); buildSymbolUI();
}

function pickUpload(cb){
  const inp = document.createElement('input'); inp.type='file'; inp.accept='image/*';
  inp.onchange = e => { if (e.target.files[0]) fileURLfromUpload(e.target.files[0], cb); };
  inp.click();
}

function flagSelect(i){
  const sel = document.createElement('select');
  CONFIG.flags.forEach(f => sel.add(new Option(f.label, f.id)));
  sel.add(new Option('Upload your own…', '__upload'));
  sel.value = state.flags[i];
  sel.onchange = e => {
    if (e.target.value === '__upload'){ pickUpload(url => { state.flagUploads[i] = url; render(); }); sel.value = state.flags[i]; }
    else { state.flags[i] = e.target.value; state.flagUploads[i] = null; render(); }
  };
  return sel;
}

// Default flag size shrinks as you add more flags so they fit the top-right corner.
const FLAG_SCALE_BY_COUNT = { 1:1, 2:1, 3:0.78, 4:0.62 };
let refreshFlagSize = () => {};
// Assigned inside buildControls so syncUI() can re-sync them after loading a design.
let renderBg = () => {};
let renderYearColors = () => {};
function buildFlagsUI(){
  const w = $('flagsWrap'); w.innerHTML = '';
  const lbl = t => { const d=document.createElement('div'); d.style.cssText='color:var(--muted);font-size:13px;margin:10px 0 6px'; d.textContent=t; return d; };
  const numLabel = lbl('Number of flags'); numLabel.style.marginTop='0'; w.appendChild(numLabel);
  const num = document.createElement('select');
  [1,2,3,4].forEach(n => num.add(new Option(String(n), String(n))));
  num.value = String(state.flagCount);
  num.onchange = e => {
    state.flagCount = Number(e.target.value);
    state.flagScale = FLAG_SCALE_BY_COUNT[state.flagCount] || 1;   // sensible default; adjustable below
    buildFlagsUI(); render();
  };
  w.appendChild(num);
  for (let i=0;i<state.flagCount;i++){ w.appendChild(lbl('Flag ' + (i+1))); w.appendChild(flagSelect(i)); }

  // Flag size control (shrinks/grows all flags together)
  w.appendChild(lbl('Flag size'));
  const sizeRow = document.createElement('div'); sizeRow.style.cssText='display:flex;align-items:center;gap:10px';
  const mk = (txt,fn) => { const b=document.createElement('button'); b.textContent=txt; b.type='button';
    b.style.cssText='width:30px;height:30px;border:1px solid var(--border);background:#fff;border-radius:8px;font-size:16px;cursor:pointer'; b.onclick=fn; return b; };
  const pct = document.createElement('span'); pct.style.cssText='color:var(--muted);font-size:13px;min-width:42px;text-align:center';
  refreshFlagSize = () => { pct.textContent = Math.round(state.flagScale*100) + '%'; };
  sizeRow.appendChild(mk('−', () => { state.flagScale = clamp(state.flagScale/1.1, 0.3, 2); refreshFlagSize(); render(); }));
  sizeRow.appendChild(pct);
  sizeRow.appendChild(mk('+', () => { state.flagScale = clamp(state.flagScale*1.1, 0.3, 2); refreshFlagSize(); render(); }));
  refreshFlagSize();
  w.appendChild(sizeRow);

  if (state.flagCount === 2){
    const swap = document.createElement('a'); swap.textContent = 'Swap front/back';
    swap.style.cssText='display:inline-block;margin-top:12px;color:var(--ring);cursor:pointer;text-decoration:underline;font-size:13px';
    swap.onclick = () => { state.flagFrontIsFirst = !state.flagFrontIsFirst; render(); };
    w.appendChild(swap);
  }
}

function buildSymbolUI(){
  const w = $('symbolWrap'); w.innerHTML = '';
  const note = document.createElement('div'); note.style.cssText='color:var(--muted);font-size:13px;margin-bottom:8px';
  note.textContent = 'Upload a round symbol/stamp for the top-right corner.'; w.appendChild(note);
  w.appendChild(uploadTile(url => { state.symbolUpload = url; render(); }));
}

/* ============================ SAVE / LOAD ============================ */
// A "design" snapshot is the full editable state minus transient view fields.
const SNAP_KEYS = ['name','background','bgUpload','main','mainUpload','secondaryOn','secondary','secUpload',
  'docsOn','yearOn','year','yearColor','corner','flagCount','flags','flagFrontIsFirst','flagScale',
  'flagUploads','symbolUpload','offsets','scales'];
function snapshot(){ const o={}; SNAP_KEYS.forEach(k => o[k]=JSON.parse(JSON.stringify(state[k]))); return o; }
function applySnapshot(s){ SNAP_KEYS.forEach(k => { if (k in s) state[k]=JSON.parse(JSON.stringify(s[k])); }); state.selected=null; }

// Re-sync every control's visual state from `state` (used after loading a design).
function syncUI(){
  $('nameInput').value = state.name || ''; updateFilename();
  renderBg();
  $('mainSelect').value = state.main;
  $('secToggle').classList.toggle('on', state.secondaryOn); $('secWrap').classList.toggle('hide', !state.secondaryOn);
  $('secSelect').value = state.secondary;
  $('docsToggle').classList.toggle('on', state.docsOn);
  $('yearToggle').classList.toggle('on', state.yearOn); $('yearWrap').classList.toggle('hide', !state.yearOn);
  $('yearInput').value = state.year || ''; renderYearColors();
  document.querySelectorAll('#cornerSeg button').forEach(b => b.classList.toggle('sel', b.dataset.corner===state.corner));
  $('flagsWrap').classList.toggle('hide', state.corner!=='flags');
  $('symbolWrap').classList.toggle('hide', state.corner!=='symbol');
  buildFlagsUI();
  preloadAndRender();
}

// In-browser library (localStorage). Note: per-browser/per-device, not shared across teammates.
const LS_KEY = 'ctb_designs';
let currentDesignId = null;
function loadDesigns(){ try { return JSON.parse(localStorage.getItem(LS_KEY)) || []; } catch(e){ return []; } }
function persistDesigns(arr){
  try { localStorage.setItem(LS_KEY, JSON.stringify(arr)); return true; }
  catch(e){ alert('Could not save — this browser’s storage is full. Delete some saved thumbnails, or use "Save project file" instead.'); return false; }
}
async function saveCurrent(){
  let name = (state.name || '').trim();
  if (!name){ name = (prompt('Name this thumbnail:', 'Untitled') || '').trim(); if (!name) return; state.name = name; updateFilename(); }
  const thumb = (await composeCanvas(96,96)).toDataURL('image/png');
  const arr = loadDesigns();
  const id = currentDesignId || ('d' + Date.now());
  const entry = { id, name, savedAt: Date.now(), state: snapshot(), thumb };
  const idx = arr.findIndex(d => d.id === id);
  if (idx >= 0) arr[idx] = entry; else arr.unshift(entry);
  if (persistDesigns(arr)){ currentDesignId = id; renderGallery(); }
}
function openDesign(id){
  const d = loadDesigns().find(x => x.id === id); if (!d) return;
  applySnapshot(d.state); currentDesignId = id; syncUI();
  window.scrollTo({ top:0, behavior:'smooth' });
}
function deleteDesign(id){
  if (!confirm('Delete this saved thumbnail?')) return;
  persistDesigns(loadDesigns().filter(x => x.id !== id));
  if (currentDesignId === id) currentDesignId = null;
  renderGallery();
}
function newDesign(){
  applySnapshot(snapshotDefaults()); currentDesignId = null; syncUI();
}
let _defaults = null;
function snapshotDefaults(){ return JSON.parse(JSON.stringify(_defaults)); }

function renderGallery(){
  const g = $('gallery'); g.innerHTML = '';
  const arr = loadDesigns();
  if (!arr.length){ g.innerHTML = '<span style="color:var(--muted);font-size:13px">No saved thumbnails yet — build one and click <b>Save</b>.</span>'; return; }
  arr.forEach(d => {
    const card = document.createElement('div');
    card.style.cssText = 'width:96px;text-align:center;cursor:pointer';
    card.title = 'Open "' + d.name + '"';
    card.innerHTML =
      '<img src="'+d.thumb+'" style="width:88px;height:88px;border:1px solid var(--border);border-radius:10px;'
      + 'background:repeating-conic-gradient(#eee 0 25%,#fff 0 50%) 0/12px 12px">'
      + '<div style="font-size:12px;margin-top:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+ (d.name||'Untitled') +'</div>'
      + '<a style="font-size:11px;color:var(--muted);text-decoration:underline">delete</a>';
    card.onclick = () => openDesign(d.id);
    card.querySelector('a').onclick = (ev) => { ev.stopPropagation(); deleteDesign(d.id); };
    g.appendChild(card);
  });
}

// Portable project files (work across computers / can live in a shared folder).
function saveProjectFile(){
  const data = { app:'collection-thumbnail-builder', v:1, name: state.name || 'Untitled', state: snapshot() };
  const blob = new Blob([JSON.stringify(data)], { type:'application/json' });
  const a = document.createElement('a');
  a.download = (TB.sanitizeFilename(state.name).replace(/\.png$/, '') || 'thumbnail') + '.thumbproj.json';
  a.href = URL.createObjectURL(blob); document.body.appendChild(a); a.click(); a.remove();
}
function openProjectFile(){
  const inp = document.createElement('input'); inp.type='file'; inp.accept='.json,application/json';
  inp.onchange = e => {
    const f = e.target.files[0]; if (!f) return;
    const fr = new FileReader();
    fr.onload = () => { try { const d = JSON.parse(fr.result); if (d && d.state){ applySnapshot(d.state); currentDesignId = null; syncUI(); } else alert('That file is not a thumbnail project.'); }
      catch(err){ alert('Could not open project file.'); } };
    fr.readAsText(f);
  };
  inp.click();
}

buildControls(); updateFilename();
_defaults = snapshot();                 // capture default state for "New"
$('saveBtn').onclick = saveCurrent;
$('newBtn').onclick = newDesign;
$('saveProj').onclick = saveProjectFile;
$('openProj').onclick = openProjectFile;
renderGallery();

/* ============================ INTERACTIONS ============================ */
function layerLabel(key){
  if (key && key.indexOf('flag') === 0) return 'Flag';
  return ({background:'Background',main:'Main image',docs:'Attached docs',year:'Year tag',secondary:'Secondary image',symbol:'Symbol'})[key] || key;
}
const clamp = (v,lo,hi) => Math.max(lo, Math.min(hi, v));
function updateSelBar(){
  const bar = $('selBar');
  if (!state.selected){ bar.innerHTML = 'Tip: click an item to select it, then move with arrow keys or resize with + / −.'; return; }
  bar.innerHTML = 'Selected: <b>'+layerLabel(state.selected)+'</b> &nbsp; move: arrows &nbsp; size:'
    + ' <a id="szDown">−</a> <a id="szUp">+</a> &nbsp; <a id="resetOne">Reset</a> <a id="resetAllLink">Reset all</a>';
  $('szDown').onclick = () => scaleSelected(1/1.1);
  $('szUp').onclick = () => scaleSelected(1.1);
  $('resetOne').onclick = () => resetLayer(state.selected);
  $('resetAllLink').onclick = resetAll;
}
function selectLayer(key){ state.selected = key; render(); updateSelBar(); }
function nudge(dx,dy){
  if (!state.selected) return;
  const o = state.offsets[state.selected] || {dx:0,dy:0};
  state.offsets[state.selected] = { dx:o.dx+dx, dy:o.dy+dy };
  render();
}
// Resize the selected item. Flags share one global size (flagScale); everything else
// is scaled per-item via state.scales[key].
function scaleSelected(mult){
  if (!state.selected) return;
  if (state.selected.indexOf('flag') === 0){
    state.flagScale = clamp(state.flagScale * mult, 0.3, 2);
    if (typeof refreshFlagSize === 'function') refreshFlagSize();
  } else {
    state.scales[state.selected] = clamp((state.scales[state.selected]||1) * mult, 0.3, 4);
  }
  render();
}
function resetLayer(key){
  delete state.offsets[key]; delete state.scales[key];
  if (key && key.indexOf('flag') === 0){ state.flagScale = 1; if (typeof refreshFlagSize === 'function') refreshFlagSize(); }
  render();
}
function resetAll(){ state.offsets = {}; state.scales = {}; state.flagScale = 1; if (typeof refreshFlagSize === 'function') refreshFlagSize(); render(); }

stage.addEventListener('click', e => {
  const el = e.target.closest('.layer');
  if (el) selectLayer(el.dataset.key); else { state.selected = null; render(); updateSelBar(); }
});
document.addEventListener('keydown', e => {
  if (!state.selected) return;
  if (document.activeElement && /INPUT|SELECT|TEXTAREA/.test(document.activeElement.tagName)) return;
  if (e.key === '+' || e.key === '='){ e.preventDefault(); scaleSelected(1.1); return; }
  if (e.key === '-' || e.key === '_'){ e.preventDefault(); scaleSelected(1/1.1); return; }
  const step = e.shiftKey ? 10 : 1;
  const map = { ArrowLeft:[-step,0], ArrowRight:[step,0], ArrowUp:[0,-step], ArrowDown:[0,step] };
  if (map[e.key]){ e.preventDefault(); nudge(map[e.key][0], map[e.key][1]); }
});

function setZoom(z){ state.zoom = Math.max(1, Math.min(8, z)); render(); }
$('zoomIn').onclick = () => setZoom(state.zoom + 0.5);
$('zoomOut').onclick = () => setZoom(state.zoom - 0.5);
$('stage').parentElement.addEventListener('wheel', e => {
  if (!(e.ctrlKey || e.metaKey)) return; e.preventDefault();
  setZoom(state.zoom + (e.deltaY < 0 ? 0.25 : -0.25));
}, { passive:false });

updateSelBar();

/* ============================ EXPORT ============================ */
let chosenSize = (CONFIG.EXPORT_SIZES.find(s=>s.default) || CONFIG.EXPORT_SIZES[0]).id;

function buildSizeList(){
  const list = $('sizeList'); list.innerHTML = '';
  CONFIG.EXPORT_SIZES.forEach(s => {
    const id = 'sz_'+s.id;
    const row = document.createElement('label');
    row.style.cssText = 'display:flex;align-items:center;gap:10px;padding:8px 0;cursor:pointer';
    row.innerHTML = '<input type="radio" name="esize" value="'+s.id+'" id="'+id+'">'
      + '<span>'+s.label+'</span>';
    list.appendChild(row);
    row.querySelector('input').checked = (s.id === chosenSize);
    row.querySelector('input').onchange = () => {
      chosenSize = s.id;
      $('customRow').classList.toggle('hide', !s.custom);
    };
  });
  $('customRow').classList.toggle('hide', !CONFIG.EXPORT_SIZES.find(s=>s.id===chosenSize && s.custom));
}

function openExportDialog(){ buildSizeList(); $('exportModal').classList.remove('hide'); }
function closeExportDialog(){ $('exportModal').classList.add('hide'); }

function loadImage(url){
  return new Promise((res, rej) => {
    const im = new Image(); im.crossOrigin = 'anonymous';
    im.onload = () => res(im); im.onerror = rej; im.src = url;
  });
}

// Compose the current design onto an off-screen transparent canvas at W×H and return it.
async function composeCanvas(W, H){
  const B = CONFIG.BASE_SIZE;
  const canvas = document.createElement('canvas'); canvas.width = W; canvas.height = H;
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0,0,W,H);                                // keep transparent
  for (const layer of getLayers()){
    const r = TB.scaleRect(placedRect(layer.rect, layer.key), W, H, B);
    if (layer.kind === 'image' || layer.kind === 'symbol'){
      const im = await loadImage(layer.src);
      if (layer.kind === 'symbol'){
        ctx.save(); ctx.beginPath();
        ctx.arc(r.x+r.w/2, r.y+r.h/2, Math.min(r.w,r.h)/2, 0, Math.PI*2); ctx.clip();
        drawContain(ctx, im, r, true); ctx.restore();
      } else {
        drawContain(ctx, im, r, false);
      }
    } else if (layer.kind === 'year'){
      ctx.fillStyle = layer.color; ctx.fillRect(r.x, r.y, r.w, r.h);   // square corners per Figma
      ctx.fillStyle = '#111'; ctx.textAlign='center'; ctx.textBaseline='middle';
      if ('letterSpacing' in ctx) ctx.letterSpacing = (1*(W/B)) + 'px';
      ctx.font = 'italic 600 ' + (8.5*(W/B)) + 'px Baskerville,"Baskerville Old Face",Georgia,serif';
      ctx.fillText(layer.text || '', r.x+r.w/2 + (W/B), r.y+r.h/2);
      if ('letterSpacing' in ctx) ctx.letterSpacing = '0px';
    }
  }
  return canvas;
}

async function exportPNG(W, H){
  const canvas = await composeCanvas(W, H);
  const a = document.createElement('a');
  a.download = TB.sanitizeFilename(state.name);
  a.href = canvas.toDataURL('image/png');
  document.body.appendChild(a); a.click(); a.remove();
}

// object-fit: contain (images) or cover (symbol) within rect r
function drawContain(ctx, im, r, cover){
  // SVG flags without width/height attrs have naturalWidth=0 in Chrome; fall back to fill the rect
  if (!im.naturalWidth || !im.naturalHeight){ ctx.drawImage(im, r.x, r.y, r.w, r.h); return; }
  const s = cover ? Math.max(r.w/im.naturalWidth, r.h/im.naturalHeight)
                  : Math.min(r.w/im.naturalWidth, r.h/im.naturalHeight);
  const w = im.naturalWidth*s, h = im.naturalHeight*s;
  ctx.drawImage(im, r.x + (r.w-w)/2, r.y + (r.h-h)/2, w, h);
}
function roundRect(ctx,x,y,w,h,rad){
  ctx.beginPath(); ctx.moveTo(x+rad,y);
  ctx.arcTo(x+w,y,x+w,y+h,rad); ctx.arcTo(x+w,y+h,x,y+h,rad);
  ctx.arcTo(x,y+h,x,y,rad); ctx.arcTo(x,y,x+w,y,rad); ctx.closePath();
}

$('downloadBtn').onclick = openExportDialog;
$('exportCancel').onclick = closeExportDialog;
$('exportGo').onclick = async () => {
  const s = CONFIG.EXPORT_SIZES.find(x => x.id === chosenSize);
  const size = s.custom ? TB.parseExportSize('custom', $('customW').value, $('customH').value)
                        : TB.parseExportSize(s.id);
  if (!size){ alert('Enter valid width and height in pixels.'); return; }
  closeExportDialog();
  await exportPNG(size.w, size.h);
};
